name: Deploy KryptoKE

on:
  push:
    branches: [main]

jobs:
  deploy-lambda:
    name: Deploy Lambda Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: lambda
        run: npm install --production

      - name: Zip for Lambda
        working-directory: lambda
        run: |
          zip -r ../function.zip . --exclude "*.zip" --exclude "env.json"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload to S3
        run: aws s3 cp function.zip s3://oda-pap-lambda-deploy/dex-function.zip --region ap-south-1

      - name: Deploy to Lambda
        run: aws lambda update-function-code --function-name dex-exchange-server --s3-bucket oda-pap-lambda-deploy --s3-key dex-function.zip --region ap-south-1

      - name: Update Lambda env vars
        run: aws lambda update-function-configuration --function-name dex-exchange-server --environment file://lambda/env.json --region ap-south-1

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-lambda
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Inject secrets into index.html
        env:
          LAMBDA_API_URL:        ${{ secrets.LAMBDA_API_URL }}
          FIREBASE_API_KEY:      ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:  ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
        run: node inject.js

      - name: Verify injection
        run: |
          if grep -q '%%LAMBDA_API_URL%%' index.html; then
            echo "ERROR: Placeholder not replaced"
            exit 1
          fi
          echo "OK - placeholders replaced"

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: 'lambda/**,README.md,.env,.github/**,env.json,inject.js,function.zip'