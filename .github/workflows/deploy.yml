name: Deploy KryptoKE

on:
  push:
    branches: [main]

jobs:
  deploy-lambda:
    name: Deploy Lambda Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: lambda
        run: npm install

      - name: Zip code only (no node_modules)
        run: |
          cd lambda
          zip -r function.zip \
            server.js \
            package.json \
            package-lock.json \
            node_modules \
            routes/auth.js \
            routes/trade.js \
            routes/tokens.js \
            routes/market.js \
            routes/mpesa.js \
            routes/wallet.js \
            routes/sweep.js \
            routes/withdraw.js \
            services/bsc.js \
            services/firebase.js \
            services/mpesa.js \
            services/forex.js \
            middleware/auth.js

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload to S3
        run: aws s3 cp lambda/function.zip s3://oda-pap-lambda-deploy/dex-function.zip --region ap-south-1

      - name: Deploy to Lambda
        run: aws lambda update-function-code --function-name dex-exchange-server --s3-bucket oda-pap-lambda-deploy --s3-key dex-function.zip --region ap-south-1

      - name: Set env vars
        run: |
          aws lambda update-function-configuration \
            --function-name dex-exchange-server \
            --environment "Variables={\
              NODE_ENV=production,\
              JWT_SECRET=${{ secrets.JWT_SECRET }},\
              FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }},\
              FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }},\
              FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }},\
              FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }},\
              MPESA_CONSUMER_KEY=${{ secrets.MPESA_CONSUMER_KEY }},\
              MPESA_CONSUMER_SECRET=${{ secrets.MPESA_CONSUMER_SECRET }},\
              MPESA_SHORTCODE=${{ secrets.MPESA_SHORTCODE }},\
              MPESA_PASSKEY=${{ secrets.MPESA_PASSKEY }},\
              MPESA_ENVIRONMENT=live,\
              INITIATOR_NAME=${{ secrets.INITIATOR_NAME }},\
              SECURITY_CREDENTIAL=${{ secrets.SECURITY_CREDENTIAL }},\
              CALLBACK_BASE_URL=${{ secrets.LAMBDA_API_URL }},\
              BSC_RPC_URL=https://bsc-dataseed1.binance.org,\
              MASTER_SEED=${{ secrets.MASTER_SEED }},\
              HOT_WALLET=${{ secrets.HOT_WALLET }},\
              HOT_WALLET_KEY=${{ secrets.HOT_WALLET_KEY }},\
              SWEEP_SECRET=${{ secrets.SWEEP_SECRET }}\
            }" \
            --region ap-south-1

  deploy-frontend:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-lambda
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject API URLs into index.html
        run: |
          sed -i "s|%%LAMBDA_API_URL%%|${{ secrets.LAMBDA_API_URL }}|g" index.html
          sed -i "s|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g" index.html
          sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" index.html
          sed -i "s|%%FIREBASE_DATABASE_URL%%|${{ secrets.FIREBASE_DATABASE_URL }}|g" index.html
          sed -i "s|%%FIREBASE_PROJECT_ID%%|${{ secrets.FIREBASE_PROJECT_ID }}|g" index.html

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: 'lambda/**,README.md,.env,.github/**,env.json'
